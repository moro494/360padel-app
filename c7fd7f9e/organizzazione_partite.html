* { box-sizing: border-box; }

.badge-fire { color: var(--hot); font-weight: 700; margin-right: 6px; }
.empty { padding: 20px; text-align: center; color: var(--muted); }

.sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; z-index: 50; }
.sheet-backdrop.open { display: block; }
.sheet { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 16px 16px 0 0; padding: 12px 16px max(16px, env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform .2s ease; z-index: 60; max-height: 92vh; overflow-y: auto; }
.sheet.open { transform: translateY(0); }
.sheet .handle { width: 40px; height: 4px; background: #ccc; border-radius: 2px; margin: 4px auto 12px; }
.sheet h2 { margin: 0 0 4px; font-size: 18px; }
.sheet .sub { color: var(--muted); margin-bottom: 12px; font-size: 14px; }
.sheet .row-info { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.sheet .row-info strong { font-weight: 600; }
.sheet .section-title { font-weight: 700; margin: 14px 0 6px; font-size: 13px; text-transform: uppercase; color: var(--muted); }
.sheet .co { padding: 4px 0; font-size: 14px; }
.sheet .templates label { display: block; padding: 6px 0; }
.sheet .templates input[type="radio"] { margin-right: 6px; }
.sheet .field { display: flex; flex-direction: column; margin-top: 8px; font-size: 14px; }
.sheet .field input, .sheet .field select { padding: 10px; font-size: 16px; border: 1px solid var(--border); border-radius: 8px; }
.sheet .hint { font-size: 12px; color: var(--muted); margin-top: 4px; padding: 0 2px; }
.sheet .preview { background: #f3f6f4; padding: 10px; border-radius: 8px; white-space: pre-wrap; margin-top: 8px; font-size: 14px; }

.sheet .wa[disabled] { background: #aaa; }
</style>

<script>
(function () {
  var DATA = JSON.parse(document.getElementById("data").textContent);
  var STATO_LABEL = {
    "DA_CONTATTARE": "DA CONTATTARE",
    "IN_CALO": "IN CALO",
    "GIA_IMPEGNATO": "GIÀ IMPEGNATO",
    "FREDDO": "DA RECUPERARE"
  };
  var VISIBLE_ORDER = ["DA_CONTATTARE", "IN_CALO", "GIA_IMPEGNATO"];
  var COLLAPSED = ["FREDDO"];
  var filters = { livello: "*", sesso: "*", q: "" };
  var collapsedOpen = {};

  function players() {
    var q = filters.q.toLowerCase();
    return DATA.players.filter(function (p) {
      if (filters.livello !== "*" && p.livello !== filters.livello) return false;
      if (filters.sesso !== "*" && p.sesso !== filters.sesso) return false;
      if (q && p.nome.toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
  }

  function sortPlayers(arr) {
    arr.sort(function (a, b) {
      if (a.on_fire !== b.on_fire) return a.on_fire ? -1 : 1;
      var au = a.metriche.ultima_gg == null ? 99999 : a.metriche.ultima_gg;
      var bu = b.metriche.ultima_gg == null ? 99999 : b.metriche.ultima_gg;
      return au - bu;
    });
    return arr;
  }

  function render() {
    var byStato = {};
    players().forEach(function (p) {
      (byStato[p.stato] = byStato[p.stato] || []).push(p);
    });
    Object.keys(byStato).forEach(function (k) { sortPlayers(byStato[k]); });
    var html = "";
    VISIBLE_ORDER.forEach(function (s) {
      var arr = byStato[s] || [];
      html += '<div class="group-title">' + STATO_LABEL[s] + ' (' + arr.length + ')</div>';
      if (!arr.length) {
        html += '<div class="empty">— nessuno —</div>';
      } else {
        arr.forEach(function (p) {
          html += cardHTML(p);
        });
      }
    });
    COLLAPSED.forEach(function (s) {
      var arr = byStato[s] || [];
      var open = !!collapsedOpen[s];
      html += '<div class="group-title collapsible" data-toggle="' + s + '">' + (open ? "▼" : "▶") + ' ' + STATO_LABEL[s] + ' (' + arr.length + ')</div>';
      if (open) {
        arr.forEach(function (p) { html += cardHTML(p); });
      }
    });
    document.getElementById("list").innerHTML = html;
    Array.prototype.forEach.call(document.querySelectorAll(".card"), function (el) {
      el.addEventListener("click", function () { openSheet(el.dataset.id); });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-toggle]"), function (el) {
      el.addEventListener("click", function () {
        var s = el.dataset.toggle;
        collapsedOpen[s] = !collapsedOpen[s];
        render();
      });
    });
  }

  function cardHTML(p) {
    var fire = p.on_fire ? '<span class="badge-fire">🔥</span>' : '';
    var ultLabel = p.metriche.ultima_gg == null ? "mai" : (p.metriche.ultima_gg + "gg fa");
    return '<div class="card" data-id="' + p.id + '">'
      + '<div class="top"><div class="nome">' + fire + escapeHTML(p.nome) + '</div></div>'
      + '<div class="meta">' + escapeHTML(p.livello) + ' · ' + escapeHTML(p.sesso) + ' · ' + ultLabel + ' · ' + p.metriche.p30 + ' partite/30gg</div>'
      + '</div>';
  }

  function escapeHTML(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function openSheet(id) {
    var p = DATA.players.filter(function (x) { return x.id === id; })[0];
    if (!p) return;
    document.getElementById("sh-nome").textContent = (p.on_fire ? "🔥 " : "") + p.nome;
    document.getElementById("sh-sub").textContent = p.livello + " · " + p.sesso + " · " + STATO_LABEL[p.stato];
    document.getElementById("sh-tel").textContent = p.telefono ? ("+" + p.telefono) : "—";
    document.getElementById("sh-mail").textContent = p.email || "—";
    document.getElementById("sh-last").textContent = p.metriche.ultima_gg == null ? "mai" : (p.metriche.ultima_gg + " gg fa");
    document.getElementById("sh-p7").textContent = p.metriche.p7;
    document.getElementById("sh-p30").textContent = p.metriche.p30;
    document.getElementById("sh-pnext").textContent = p.metriche.prossime7;
    document.getElementById("sh-pref").textContent = (p.preferenze || []).join(", ") || "—";
    document.getElementById("sh-co").innerHTML = (p.co_giocatori || []).map(function (c) {
      return '<div class="co">• ' + escapeHTML(c.nome) + ' (' + c.partite + ')</div>';
    }).join("") || '<div class="co">—</div>';
    var sheet = document.getElementById("sheet");
    var back = document.getElementById("backdrop");
    sheet.dataset.playerId = p.id;
    sheet.classList.add("open");
    back.classList.add("open");
    sheet.setAttribute("aria-hidden", "false");
    refreshFields();
  }

  function closeSheet() {
    document.getElementById("sheet").classList.remove("open");
    document.getElementById("backdrop").classList.remove("open");
    document.getElementById("sheet").setAttribute("aria-hidden", "true");
  }

  document.getElementById("backdrop").addEventListener("click", closeSheet);

  function currentPlayer() {
    var id = document.getElementById("sheet").dataset.playerId;
    return DATA.players.filter(function (x) { return x.id === id; })[0];
  }

  function currentTpl() {
    var sel = document.querySelector('input[name="tpl"]:checked');
    return sel ? sel.value : "primo_contatto";
  }

  function fieldsForTpl(tpl, p) {
    var compagni = (p.co_giocatori || []).map(function (c) { return c.nome; }).slice(0, 5);
    if (tpl === "primo_contatto") {
      return '<label class="field">Data/ora 1 <input id="f1" placeholder="martedì ore 18"></label>'
        + '<label class="field">Data/ora 2 <input id="f2" placeholder="mercoledì ore 20"></label>';
    }
    if (tpl === "chiudi_partita") {
      var hint = compagni.length
        ? '<div class="hint">💡 Top co-giocatori: ' + compagni.map(escapeHTML).join(" · ") + '</div>'
        : '';
      return '<label class="field">Data/ora <input id="f1" placeholder="giovedì ore 21:30"></label>'
        + '<label class="field">Compagni <input id="f2" placeholder="es. Marco, Giovanni e Roberto"></label>'
        + hint;
    }
    return '<label class="field">Ora <input id="f1" placeholder="21:30"></label>';
  }

  function refreshFields() {
    var p = currentPlayer();
    if (!p) return;
    var tpl = currentTpl();
    var key = "tpl_" + tpl;
    var stored = {};
    try { stored = JSON.parse(localStorage.getItem(key) || "{}"); } catch (e) {}
    document.getElementById("fields").innerHTML = fieldsForTpl(tpl, p);
    ["f1","f2"].forEach(function (id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (stored[id]) el.value = stored[id];
      el.addEventListener("input", function () {
        stored[id] = el.value;
        localStorage.setItem(key, JSON.stringify(stored));
        refreshPreview();
      });
      el.addEventListener("change", function () {
        stored[id] = el.value;
        localStorage.setItem(key, JSON.stringify(stored));
        refreshPreview();
      });
    });
    refreshPreview();
  }

  function firstName(s) { return String(s).trim().split(/\s+/)[0]; }

  function templateString(tpl) {
    return DATA.templates[tpl];
  }

  function buildMessage(p, tpl) {
    var s = templateString(tpl);
    var f1 = (document.getElementById("f1") || {}).value || "";
    var f2 = (document.getElementById("f2") || {}).value || "";
    return s
      .replace("{nome}", firstName(p.nome))
      .replace("{livello}", p.livello)
      .replace("{data1}", f1)
      .replace("{data2}", f2)
      .replace("{data}", f1)
      .replace("{compagni}", f2)
      .replace("{ora}", f1);
  }

  function refreshPreview() {
    var p = currentPlayer();
    if (!p) return;
    var msg = buildMessage(p, currentTpl());
    document.getElementById("preview").textContent = msg;
    var wa = document.getElementById("waBtn");
    if (!p.telefono) {
      wa.disabled = true;
      wa.textContent = "Telefono mancante";
    } else {
      wa.disabled = false;
      wa.textContent = "💬 Apri WhatsApp";
    }
  }

  document.getElementById("waBtn").addEventListener("click", function () {
    var p = currentPlayer();
    if (!p || !p.telefono) return;
    var msg = buildMessage(p, currentTpl());
    window.open("https://wa.me/" + p.telefono + "?text=" + encodeURIComponent(msg), "_blank");
  });

  Array.prototype.forEach.call(document.querySelectorAll('input[name="tpl"]'), function (r) {
    r.addEventListener("change", refreshFields);
  });

  document.getElementById("q").addEventListener("input", function (e) {
    filters.q = e.target.value;
    render();
  });

  function bindChips(rowId, key) {
    document.getElementById(rowId).addEventListener("click", function (e) {
      var btn = e.target.closest(".chip");
      if (!btn) return;
      filters[key] = btn.dataset.value;
      Array.prototype.forEach.call(document.querySelectorAll('#' + rowId + ' .chip'), function (c) {
        c.classList.toggle("active", c === btn);
      });
      render();
    });
  }
  bindChips("livello-row", "livello");
  bindChips("sesso-row", "sesso");

  render();
})();
</script>
